<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마음 진단 - 오늘의 노래 추천</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="mood-default">
    <div class="container glass">
        <!-- 시작 화면 -->
        <div id="start-screen" class="view">
            <header>
                <h1>마음 진단소</h1>
                <p>10개의 간단한 질문을 통해 현재 당신의 마음 상태를 확인하고,<br>그에 어울리는 노래를 추천해 드립니다.</p>
            </header>
            <button id="start-survey-btn" class="main-btn">테스트 시작하기</button>
        </div>

        <!-- 설문 화면 -->
        <div id="survey-screen" class="view hidden">
            <div class="progress-container">
                <div id="progress-bar" class="progress-bar"></div>
            </div>
            <div class="question-container">
                <span id="question-number">Q1.</span>
                <h2 id="question-text">질문 내용이 여기에 표시됩니다.</h2>
            </div>
            <div class="answer-options">
                <button class="answer-btn" data-score="1">전혀 아니다</button>
                <button class="answer-btn" data-score="2">아니다</button>
                <button class="answer-btn" data-score="3">보통이다</button>
                <button class="answer-btn" data-score="4">그렇다</button>
                <button class="answer-btn" data-score="5">매우 그렇다</button>
            </div>
        </div>

        <!-- 결과 화면 -->
        <div id="result-screen" class="view hidden">
            <header>
                <h2>당신의 현재 마음은...</h2>
                <div id="mood-result-display">
                    <span id="mood-emoji">😊</span>
                    <h1 id="mood-name">기쁨</h1>
                </div>
            </header>
            
            <main id="recommendation-area">
                <div id="recommendation-result" class="recommendation-single">
                    <!-- 추천 노래 카드가 여기에 생성됨 -->
                </div>
            </main>
            
            <button id="restart-btn" class="secondary-btn">다시 테스트하기</button>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
